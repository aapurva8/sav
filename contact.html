<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
    <style>
        body {
            background: linear-gradient(to top, #5e317e, #501786);
            color: white;
            font-family: Arial;
            text-align: center;
        }
        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: white;
            color: purple;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
        }
        a {
            color: white;
            text-decoration: none;
            background: #6a0dad;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>Contact Us</h1>

<form>
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>
    <button type="submit">Send</button>
</form>

<br>
<a href="index.html">Back to Home</a>

</body>
</html>
