<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <style>
        body {
            background: linear-gradient(to right, #4b0082, #8a2be2);
            text-align: center;
            color: white;
            font-family: Arial;
        }
        img {
            width: 250px;
            margin: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }
        img:hover {
            transform: scale(1.05);
        }
        a {
            color: white;
            text-decoration: none;
            background: #6a0dad;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
